    <radialGradient id="glowB" cx="18%" cy="70%" r="55%"><stop offset="0" stop-color="#d3a43f" stop-opacity="0.25"/><stop offset="1" stop-color="#d3a43f" stop-opacity="0"/></radialGradient>
