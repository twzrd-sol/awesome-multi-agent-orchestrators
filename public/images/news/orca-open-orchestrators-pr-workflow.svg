    <g transform="translate(1120 370)"><rect width="360" height="220" rx="28" fill="#0d241f" stroke="#3c7c69" stroke-width="3"/><rect x="24" y="24" width="64" height="64" rx="14" fill="#113d34" stroke="#56c6a7" stroke-width="2"/><path d="M42 59l13 13 28-33" stroke="#d8b35d" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M122 44h188M122 76h132" stroke="#bde8d8" stroke-width="7" stroke-linecap="round"/><text x="32" y="160" fill="#f4ead2" font-family="Arial" font-size="31" font-weight="700">Merge</text><text x="32" y="195" fill="#9fc7b9" font-family="Arial" font-size="22">human / AI path</text></g>
