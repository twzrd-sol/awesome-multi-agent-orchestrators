<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Paperclip v2026.513.0 recovery and Blocked Inbox diagram</title>
  <desc id="desc">A dark editorial diagram showing a stalled issue flowing into source-scoped recovery, a Blocked Inbox attention view, operator decision, and restored, blocked, cancelled, or false positive outcomes.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" seed="513" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.055"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="noise" mode="overlay"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#f5efe3"/>
    </marker>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#f5efe3" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1110"/>
      <stop offset="0.48" stop-color="#1c1712"/>
      <stop offset="1" stop-color="#070806"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f06a19"/>
      <stop offset="1" stop-color="#e4b05b"/>
    </linearGradient>
    <style>
      .serif{font-family: Georgia, 'Times New Roman', serif; fill:#f5efe3;}
      .mono{font-family:'Courier New', ui-monospace, monospace; fill:#f5efe3; letter-spacing:.12em;}
      .title{font-size:47px;font-weight:700;letter-spacing:-.025em}.small{font-size:22px}.tiny{font-size:16px}.label{font-size:17px;font-weight:700;letter-spacing:.14em}.body{font-size:19px;fill:#efe1c4;letter-spacing:.01em}.mini{font-size:14px;fill:#cfc0a3;letter-spacing:.06em}
      .frame{fill:rgba(13,14,13,.84);stroke:#e7d8bd;stroke-opacity:.52;stroke-width:1.5}.panel{fill:rgba(28,23,18,.88);stroke:#e7d8bd;stroke-opacity:.58;stroke-width:1.4}.issue{fill:rgba(28,23,18,.9);stroke:#f06a19;stroke-opacity:.86;stroke-width:1.8}.recovery{fill:rgba(15,54,42,.78);stroke:#78d3ad;stroke-opacity:.85;stroke-width:1.8}.inbox{fill:rgba(30,38,37,.9);stroke:#add1b6;stroke-opacity:.9;stroke-width:1.8}.operator{fill:rgba(55,39,23,.88);stroke:#e4b05b;stroke-opacity:.88;stroke-width:1.8}.outcome{fill:rgba(18,26,23,.9);stroke:#f5efe3;stroke-opacity:.52;stroke-width:1.3}.line{fill:none;stroke:#f5efe3;stroke-opacity:.55;stroke-width:2;marker-end:url(#arrow)}.dash{stroke-dasharray:7 7}.divider{stroke:#e7d8bd;stroke-opacity:.22;stroke-width:1}.chip{fill:rgba(245,239,227,.08);stroke:#e7d8bd;stroke-opacity:.25;stroke-width:1}.paper{fill:none;stroke:#f5efe3;stroke-width:10;stroke-linecap:round}.dotOrange{fill:#f06a19}.dotMint{fill:#78d3ad}.dotSand{fill:#f5efe3;opacity:.75}
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)" opacity=".75"/>
  <g opacity=".18">
    <path d="M108 548 C221 423 310 361 438 345 C602 324 708 241 826 170 C915 116 1016 90 1122 84" fill="none" stroke="#78d3ad" stroke-width="2"/>
    <path d="M70 596 C222 497 358 483 502 438 C643 394 716 311 861 276 C963 252 1058 265 1142 308" fill="none" stroke="#f06a19" stroke-width="1.5" stroke-dasharray="5 13"/>
    <circle cx="1020" cy="142" r="76" fill="none" stroke="#f5efe3" stroke-opacity=".18"/>
    <circle cx="1020" cy="142" r="38" fill="none" stroke="#f5efe3" stroke-opacity=".2"/>
  </g>

  <rect x="34" y="30" width="1132" height="615" rx="5" class="frame"/>
  <line x1="34" y1="120" x2="1166" y2="120" class="divider"/>
  <line x1="294" y1="30" x2="294" y2="120" class="divider"/>
  <line x1="934" y1="30" x2="934" y2="120" class="divider"/>

  <text x="70" y="68" class="mono tiny">PAPERCLIP · V2026.513.0</text>
  <text x="70" y="98" class="serif title">RECOVERY LOOP</text>
  <text x="326" y="76" class="serif small">Blocked agent work becomes visible, owned, and resolved.</text>
  <text x="964" y="66" class="mono tiny">SOURCE ISSUE</text>
  <text x="964" y="94" class="mono tiny">BLOCKED INBOX</text>

  <path d="M244 291 H352" class="line"/>
  <path d="M524 291 H631" class="line"/>
  <path d="M812 291 H916" class="line"/>
  <path d="M1000 383 C1000 426 943 438 896 460" class="line dash"/>
  <path d="M1022 383 C1022 428 1028 440 1034 460" class="line dash"/>
  <path d="M1045 383 C1068 424 1110 435 1120 460" class="line dash"/>
  <path d="M378 375 C350 425 284 443 232 475" class="line dash"/>

  <g transform="translate(70 197)">
    <rect width="176" height="188" rx="5" class="issue"/>
    <text x="22" y="39" class="mono label">SOURCE ISSUE</text>
    <line x1="20" y1="58" x2="156" y2="58" class="divider"/>
    <text x="22" y="92" class="serif body">run stalled</text>
    <text x="22" y="119" class="serif body">missing disposition</text>
    <text x="22" y="146" class="serif body">blocker unclear</text>
    <g transform="translate(22 166)">
      <rect width="89" height="21" rx="10" class="chip"/>
      <text x="13" y="15" class="mono mini">NEEDS TRIAGE</text>
    </g>
  </g>

  <g transform="translate(354 197)">
    <rect width="174" height="188" rx="5" class="recovery"/>
    <text x="22" y="39" class="mono label">RECOVERY</text>
    <line x1="20" y1="58" x2="154" y2="58" class="divider"/>
    <text x="22" y="92" class="serif body">owner</text>
    <text x="22" y="119" class="serif body">evidence</text>
    <text x="22" y="146" class="serif body">wake policy</text>
    <g transform="translate(112 24)">
      <path class="paper" d="M0 0a28 28 0 0 1 28 28v64a20 20 0 0 1-40 0V28a8 8 0 0 1 16 0v54" opacity=".22"/>
    </g>
  </g>

  <g transform="translate(635 197)">
    <rect width="180" height="188" rx="5" class="inbox"/>
    <text x="22" y="39" class="mono label">BLOCKED INBOX</text>
    <line x1="20" y1="58" x2="160" y2="58" class="divider"/>
    <g transform="translate(22 79)">
      <rect width="128" height="24" rx="12" class="chip"/>
      <text x="14" y="17" class="mono mini">blocked reason</text>
    </g>
    <g transform="translate(22 114)">
      <rect width="72" height="24" rx="12" class="chip"/>
      <text x="14" y="17" class="mono mini">search</text>
    </g>
    <g transform="translate(22 149)">
      <rect width="111" height="24" rx="12" class="chip"/>
      <text x="14" y="17" class="mono mini">urgency sort</text>
    </g>
  </g>

  <g transform="translate(919 197)">
    <rect width="180" height="188" rx="5" class="operator"/>
    <text x="22" y="39" class="mono label">OPERATOR</text>
    <line x1="20" y1="58" x2="160" y2="58" class="divider"/>
    <text x="22" y="92" class="serif body">review evidence</text>
    <text x="22" y="119" class="serif body">confirm blocker</text>
    <text x="22" y="146" class="serif body">choose outcome</text>
  </g>

  <g transform="translate(164 486)">
    <rect width="180" height="74" rx="5" class="outcome"/>
    <circle cx="24" cy="25" r="6" class="dotOrange"/>
    <text x="43" y="30" class="mono label">PLUGIN DEV</text>
    <text x="24" y="55" class="serif body">init · reload · sdk</text>
  </g>

  <g transform="translate(788 486)">
    <rect width="132" height="74" rx="5" class="outcome"/>
    <circle cx="24" cy="25" r="6" class="dotMint"/>
    <text x="43" y="30" class="mono label">RESTORED</text>
    <text x="24" y="55" class="serif body">wake work</text>
  </g>
  <g transform="translate(944 486)">
    <rect width="132" height="74" rx="5" class="outcome"/>
    <circle cx="24" cy="25" r="6" class="dotOrange"/>
    <text x="43" y="30" class="mono label">BLOCKED</text>
    <text x="24" y="55" class="serif body">real blocker</text>
  </g>
  <g transform="translate(788 582)">
    <rect width="132" height="42" rx="5" class="outcome"/>
    <circle cx="24" cy="21" r="5" class="dotSand"/>
    <text x="43" y="26" class="mono label">CANCELLED</text>
  </g>
  <g transform="translate(944 582)">
    <rect width="155" height="42" rx="5" class="outcome"/>
    <circle cx="24" cy="21" r="5" class="dotSand"/>
    <text x="43" y="26" class="mono label">FALSE POSITIVE</text>
  </g>

  <text x="70" y="615" class="mono small">AGENT WORK NEEDS RECOVERY SURFACES, NOT JUST MORE WORKERS.</text>
  <g filter="url(#grain)"><rect width="1200" height="675" fill="transparent"/></g>
</svg>
